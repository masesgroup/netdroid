# This is a basic workflow to help you get started with Actions

name: CI_VERSION

# Controls when the action will run. Triggers the workflow on push
# events but only for the master branch
on:
  workflow_dispatch:
    inputs:
      CurrentVersion:
        description: 'The current version'
        required: true
        type: string
      NewVersion:
        description: 'The new version'
        required: true
        type: string
        
# This workflow contains one job called "build_documentation"
jobs:
  update_version:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps: 
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
        with:
          fetch-depth: '1'
          submodules: 'true'

      - run: (Get-Content ${{ github.workspace }}\src\jvm\jnet\pom.xml).Replace('<netdroidVersion>${{ inputs.CurrentVersion }}</netdroidVersion>', '<netdroidVersion>${{ inputs.NewVersion }}</netdroidVersion>') | Set-Content ${{ github.workspace }}\src\jvm\jnet\pom.xml
        shell: pwsh
        
      - run: (Get-Content ${{ github.workspace }}\src\net\Common\Common.props).Replace('<Version>${{ inputs.CurrentVersion }}</Version>', '<Version>${{ inputs.NewVersion }}</Version>') | Set-Content ${{ github.workspace }}\src\net\Common\Common.props
        shell: pwsh

      - name: Request a PR to commit changes
        uses: peter-evans/create-pull-request@v8
        with:
          branch-suffix: short-commit-hash
          add-paths: src/*.*
          commit-message: Update version from ${{ inputs.CurrentVersion }} to ${{ inputs.NewVersion }}
          title: Update version from ${{ inputs.CurrentVersion }} to ${{ inputs.NewVersion }}
          body: |
            Automated changes by GitHub action fix #203
          reviewers: masesdevelopers
          assignees: masesdevelopers
          labels: enhancement, Docker, java, Netdroid, NetdroidCLI, .NET 
